services:

  loggifly:
    image: ghcr.io/clemcer/loggifly:v2
    restart: unless-stopped
    pull_policy: always
    environment:
      SYSTEM_NOTIFICATIONS: false
      APPRISE_URL: "${APPRISE_URL:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  minecraft:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    pull_policy: always
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "25565:25565"
    volumes:
      - minecraft_data:/data
    depends_on:
      - loggifly
    environment:
      EULA: TRUE

      SERVER_NAME: Mine dos Crazy
      MOTD: "Owwwwwwwww §aStoneMask§r..."
      ICON: https://i.scdn.co/image/ab67616d0000b27332ff042034155f8757459ddb

      VERSION: 26.1
      ONLINE_MODE: false
      MAX_PLAYERS: 12
      ENABLE_COMMAND_BLOCK: false
      DIFFICULTY: normal
      PVP: true
      MODE: survival
      LEVEL_TYPE: minecraft:default
      SPAWN_NPCS: true
      SPAWN_ANIMALS: true
      SPAWN_MONSTERS: true
      GENERATE_STRUCTURES: true
      ALLOW_NETHER: true
      ANNOUNCE_PLAYER_ACHIEVEMENTS: true
      ALLOW_FLIGHT: false
      ENABLE_WHITELIST: true
      VIEW_DISTANCE: 12
      SIMULATION_DISTANCE: 10

      ENABLE_RCON: true
      RCON_PORT: 25575
      RCON_PASSWORD: ${RCON_PASSWORD:-minedoscrazy}

      MEMORY: 6G
      MAX_MEMORY: 20G
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:ParallelGCThreads=8 -XX:MaxGCPauseMillis=200"
      TZ: America/Sao_Paulo

      TYPE: FABRIC
      FABRIC_FORCE_REINSTALL: true
      MODRINTH_ALLOWED_VERSION_TYPE: alpha
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      MODRINTH_PROJECTS: |
        fabric-api
        lithium
        c2me-fabric
        scalablelux
        ferrite-core
        packet-fixer
        disconnect-packet-fix
        vmp-fabric
        krypton
        inventory-management
        alternate-current
        easyauth
        easywhitelist
        luckperms
        vanilla-permissions
    
    labels:
      loggifly.monitor: "true"

      loggifly.keywords.0: "Server empty for 60 seconds, pausing"
      loggifly.keywords.0.container_action: stop
      loggifly.keywords.0.container_action_cooldown: 30
      loggifly.keywords.0.title_template: "⚠️ **Nenhum jogador online!**"
      loggifly.keywords.0.message_template: "O servidor foi desligado automaticamente para economizar recursos."

      loggifly.keywords.1: "Thread RCON Listener started"
      loggifly.keywords.1.title_template: "🟢 **Servidor ligado!**"
      loggifly.keywords.1.message_template: "Você já pode se conectar ao servidor `${SERVER_ADDRESS:-localhost}` usando a senha `${SERVER_PASSWORD:-password}`."

      loggifly.container_events.0.event: "die"
      loggifly.container_events.0.title_template: "🔴 **Servidor desligado!**"
      loggifly.container_events.0.message_template: "Já não é mais possível se conectar ao servidor."

      loggifly.container_events.1.event: "unhealthy"
      loggifly.container_events.1.title_template: "⚠️ **Não foi possivel iniciar o servidor!**"
      loggifly.container_events.1.message_template: "Ocorreu um erro inesperado durante a inicialização do servidor."

volumes:
  minecraft_data: